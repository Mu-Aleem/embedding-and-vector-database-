<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Chatbot</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">
        <h1>Movie Chatbot</h1>
        <p>Ask me anything about movies!</p>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="message bot">
          <p>Hey! I'm your movie expert. Ask me anything about movies - recommendations, ratings, actors, or whatever you're curious about!</p>
        </div>
      </div>
      <form class="chat-input" id="chatForm">
        <input
          type="text"
          id="userInput"
          placeholder="Type your message..."
          autocomplete="off"
        />
        <button type="submit">Send</button>
      </form>
    </div>

    <script>
      const chatForm = document.getElementById("chatForm");
      const userInput = document.getElementById("userInput");
      const chatMessages = document.getElementById("chatMessages");

      function addMessage(text, sender) {
        const div = document.createElement("div");
        div.className = `message ${sender}`;
        div.innerHTML = `<p>${text}</p>`;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      chatForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const message = userInput.value.trim();
        if (!message) return;

        addMessage(message, "user");
        userInput.value = "";

        addMessage("Thinking...", "bot loading");

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message }),
          });
          const data = await res.json();

          chatMessages.removeChild(chatMessages.lastChild);
          addMessage(data.reply, "bot");
        } catch (err) {
          chatMessages.removeChild(chatMessages.lastChild);
          addMessage("Sorry, something went wrong. Please try again.", "bot");
        }
      });
    </script>
  </body>
</html>
